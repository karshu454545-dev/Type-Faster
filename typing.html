<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Typing Speed Booster Game</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <h1>Typing Speed Booster Game</h1>
  <div class="target-div">
    <p class="target-text"></p>

  <p class="current-game-result">

  <script type="module" src="gamework.js"></script>

</body>

</html>
